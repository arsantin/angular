<h1>Login</h1>
<form
  action=""
  class="flex flex-col gap-2 bg-gray-200 p-4 rounded-lg justify-center max-w-[500px] mx-auto mt-10 [&_input]:bg-white [&_input]:p-2 [&_input]:rounded-lg [&_input]:outline-none [&_button]:bg-blue-500 [&_button]:p-2 [&_button]:rounded-lg [&_button]:outline-none [&_button]:hover:bg-blue-600"
>
  <label for="email" class="sr-only">Email</label>
  <input type="email" id="email" placeholder="email" [formField]="loginForm.email" />
  <label for="password" class="sr-only">Password</label>
  <input type="password" id="password" placeholder="password" [formField]="loginForm.password" />
  <button type="button" (click)="postLogin()">Send</button>
</form>
